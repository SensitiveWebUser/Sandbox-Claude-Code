name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and bats
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats

      - name: Shellcheck (follows sourced files)
        run: |
          shellcheck -x \
            scc \
            lib/*.sh \
            lib/commands/*.sh \
            install.sh \
            install-remote.sh \
            entrypoint.sh \
            init-firewall.sh \
            docker/toolchains/install.sh \
            tests/stubs/docker

      - name: Bats tests
        run: bats tests

      - name: Docker build smoke test
        run: docker build -t scc:ci .

      # CI otherwise only builds the image; this actually runs it so the
      # created 'node' user, the entrypoint UID-remap, and the Claude binary
      # (proving no Node runtime is needed) are all exercised.
      - name: Runtime smoke test
        run: docker run --rm -e HOST_UID=1000 -e HOST_GID=1000 scc:ci claude --version

      # Hardened path: read-only rootfs + a non-default UID, which forces the
      # entrypoint's numeric-uid:gid remap (it can't edit /etc/passwd). The
      # anonymous volume gives /home/node a writable layer, as a real run does.
      - name: Runtime smoke test (hardened)
        run: |
          docker run --rm --read-only -v /home/node \
            --tmpfs /tmp:rw,nosuid,nodev,noexec --tmpfs /var/tmp --tmpfs /run \
            -e HOST_UID=1234 -e HOST_GID=1234 scc:ci claude --version

      - name: Report image size
        run: docker images scc:ci --format 'scc:ci image size = {{.Size}}'

  # Build each opt-in toolchain layer on top of the base and prove the tool runs.
  toolchains:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { tc: python, check: "python3 --version" }
          - { tc: node,   check: "node --version" }
          - { tc: go,     check: "go version" }
          - { tc: rust,   check: "cargo --version" }
    steps:
      - uses: actions/checkout@v4
      - name: Build base image
        run: docker build -t scc:base .
      - name: Build ${{ matrix.tc }} toolchain layer
        run: |
          docker build --build-arg BASE=scc:base --build-arg TOOLCHAINS=${{ matrix.tc }} \
            -t scc:tc-${{ matrix.tc }} docker/toolchains
      - name: Smoke-test ${{ matrix.tc }}
        run: |
          docker run --rm -e HOST_UID=1000 -e HOST_GID=1000 \
            scc:tc-${{ matrix.tc }} ${{ matrix.check }}
      - name: Report ${{ matrix.tc }} image size
        run: docker images scc:tc-${{ matrix.tc }} --format '{{.Repository}}:{{.Tag}} = {{.Size}}'
