name: Release

# On a semver tag (e.g. v1.2.3): build the image, push it to the GitHub
# Container Registry (GHCR), and cut a GitHub release. The published image
# lets users skip the local build; `scc rebuild` still builds locally.

on:
  push:
    # Version tags only (vX.Y.Z, optionally with a -rc/-beta suffix). A bare
    # `v1` or `vbeta` won't trigger. That avoids publishing an image that has
    # no version tag.
    tags: [ 'v[0-9]*.[0-9]*.[0-9]*' ]

permissions:
  contents: write   # create the GitHub release
  packages: write   # push the image to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The VERSION file is what an installed scc reports and what self-update
      # compares against. It must match the tag, or a source-archive install
      # would misreport its version. Bump VERSION in the release commit.
      - name: Verify VERSION matches the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(tr -d '[:space:]' < VERSION)"
          if [ "$file" != "$tag" ]; then
            echo "VERSION ('$file') does not match tag ('$tag'). Bump VERSION before tagging." >&2
            exit 1
          fi

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name for GHCR automatically.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Only move :latest for real releases, never pre-releases (-rc/-beta).
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
